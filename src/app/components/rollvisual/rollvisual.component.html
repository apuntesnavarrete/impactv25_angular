<div class="main-container">

  <div class="control-panel">
    <h3>Generar Imagen Aguigol</h3>
    
    <div class="input-group uploader-section">
      <label class="control-label">📷 Escanear Rol desde Imagen:</label>
      <input 
        type="file" 
        accept="image/*" 
        (change)="capturarYProcesarImagen($event)"
        [disabled]="cargandoGemini"
        class="file-input"
      />
      @if (cargandoGemini) {
        <p class="loading-text">⏳ Procesando con IA de Gemini... por favor espera.</p>
      }
    </div>

    <hr class="separator" />

    <div class="buttons-group">
      <button (click)="cambiarCampo('1')" [class.active]="numeroCampo === '1'">Campo 1</button>
      <button (click)="cambiarCampo('2')" [class.active]="numeroCampo === '2'">Campo 2</button>
    </div>

    <div class="input-group">
      <label class="control-label">Día de la Semana:</label>
      <select [(ngModel)]="diaSemana" (ngModelChange)="onDiaSemanaChange()" class="day-select">
        <option value="LUNES">Lunes</option>
        <option value="MARTES">Martes</option>
        <option value="MIÉRCOLES">Miércoles</option>
        <option value="JUEVES">Jueves</option>
        <option value="VIERNES">Viernes</option>
        <option value="SÁBADO">Sábado</option>
        <option value="DOMINGO">Domingo</option>
      </select>
    </div>

    <div class="json-panel">
      <label class="control-label">Estructura del Rol (JSON):</label>
      <textarea 
        [(ngModel)]="jsonTexto" 
        rows="10" 
        class="json-textarea"
        placeholder="Pega el JSON aquí o sube una imagen arriba...">
      </textarea>
      <button (click)="actualizarPartidos()" class="btn-update">
        🔄 Actualizar Datos / Póster
      </button>
    </div>
  </div>

  <div id="posterAguigol" class="flyer-poster">
    
    <img 
      src="http://192.168.0.19:8080/public/teams/rollaguigol.jpg" 
      class="background"
      alt="Fondo Aguigol"
    >
    
    <div class="campo-title-container">
      CAMPO {{ numeroCampo }}
    </div>

    <div class="dia-title-container">
      {{ diaSemana }}
    </div>

    <div class="matches-list">
      @for (juego of listaPartidos; track $index) {
        <app-filaroll [partido]="juego"></app-filaroll>
      } @empty {
        <div class="no-matches">No hay partidos agendados</div>
      }
    </div>

  </div> 
  
  <app-btn-descargar 
    targetId="posterAguigol" 
    [nombreArchivo]="'Aguigol_Campo_' + numeroCampo + '_' + diaSemana">
  </app-btn-descargar>

</div>
